<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="shell">
  <div id="slider">

    <!-- ── Main View ─────────────────────────────────────── -->
    <div class="view" id="mainView">

      <div class="header">
        <div class="header-title">Sleep Tab</div>
        <span class="tab-count" id="tabCount"></span>

        <!-- Search (hover to expand) -->
        <div class="search-wrapper" id="searchWrapper">
          <div class="search-icon" id="searchIcon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="14" height="14">
              <circle cx="6.5" cy="6.5" r="4.2"/>
              <line x1="9.7" y1="9.7" x2="13.5" y2="13.5"/>
            </svg>
          </div>
          <input class="search-input" id="searchInput" type="text" autocomplete="off" spellcheck="false" />
        </div>

        <!-- Settings button -->
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
            <circle cx="8" cy="8" r="2.2"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
          </svg>
        </button>
      </div>

      <!-- Tab list (rendered by popup.js) -->
      <div class="tab-list" id="tabList"></div>

      <div class="footer">
        <div class="select-toggle" id="selectToggle" title="Select all / Deselect all"></div>
        <span class="footer-info" id="footerInfo"></span>
        <button class="btn btn-disabled" id="protectBtn"></button>
        <button class="btn btn-primary btn-disabled" id="sleepBtn"></button>
      </div>

    </div><!-- /mainView -->

    <!-- ── Settings View ──────────────────────────────────── -->
    <div class="view" id="settingsView">

      <div class="settings-header">
        <button class="icon-btn" id="backBtn" title="Back">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="14" height="14">
            <polyline points="10,3 5,8 10,13"/>
          </svg>
        </button>
        <span class="settings-title" id="settingsTitle">Settings</span>
        <button class="btn btn-primary btn-sm" id="applyBtn">Apply</button>
      </div>

      <div class="settings-body">
        <div class="setting-label" id="langLabel">Language</div>
        <div class="lang-options">
          <div class="lang-option active" data-lang="English">
            <div class="lang-radio"></div>
            <span class="lang-name">English</span>
          </div>
          <div class="lang-option" data-lang="Spanish">
            <div class="lang-radio"></div>
            <span class="lang-name">Español</span>
          </div>
          <div class="lang-option" data-lang="French">
            <div class="lang-radio"></div>
            <span class="lang-name">Français</span>
          </div>
          <div class="lang-option" data-lang="German">
            <div class="lang-radio"></div>
            <span class="lang-name">Deutsch</span>
          </div>
          <div class="lang-option" data-lang="Portuguese">
            <div class="lang-radio"></div>
            <span class="lang-name">Português</span>
          </div>
        </div>
      </div>

      <div class="settings-footer">
        <div class="version-row">
          <span class="version-text">Sleep Tab · v1.0.0</span>
          <span class="version-sep">·</span>
          <a class="docs-link" href="https://github.com/BeyremHF/Sleep-Tab" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" fill="currentColor" width="11" height="11">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Documentation
          </a>
        </div>
      </div>

    </div><!-- /settingsView -->

  </div><!-- /slider -->
</div><!-- /shell -->

<script src="popup.js"></script>
</body>
</html>
